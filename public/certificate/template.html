<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlet 5.0 | Participant Achievement</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Fredoka+One&family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --navy: #001f3f;
            --pink: #ff4d94;
            --yellow: #ffd700;
            --bg-off-white: #fffdf5;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--navy);
            font-family: 'Outfit', sans-serif;
        }

        /* Download Button Styles */
        .download-btn {
            position: fixed;
            top: 40px;
            right: 40px;
            background-color: var(--pink);
            color: white;
            border: 3px solid var(--navy);
            padding: 16px 32px;
            border-radius: 16px;
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 8px 8px 0px var(--navy);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .download-btn:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px var(--navy);
        }

        .download-btn:active {
            transform: translate(6px, 6px);
            box-shadow: 2px 2px 0px var(--navy);
        }

        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background: white;
            }
            .certificate-page {
                box-shadow: none;
                margin: 0;
                border: none;
            }
        }

        .certificate-page {
            width: 1123px; /* A4 Landscape */
            height: 794px;
            background-image: url('particpation.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
        }

        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-family: 'Fredoka One', cursive;
            font-size: 11rem;
            color: rgba(0, 31, 63, 0.03);
            white-space: nowrap;
            pointer-events: none;
            z-index: 1;
            letter-spacing: 4rem;
        }

        .metadata {
            font-size: 0.7rem;
            color: rgba(0, 31, 63, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1;
        }

        .header-logos {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            z-index: 2;
        }

        .logo-box {
            width: 85px;
            height: 85px;
            border-radius: 15px;
            border: 3px solid var(--navy);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 5px 5px 0px var(--pink);
            overflow: hidden;
        }

        .logo-main {
            width: 85%;
            height: auto;
        }

        .cert-title-group {
            text-align: center;
            z-index: 2;
        }

        .cert-title-group h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 5.5rem;
            color: var(--navy);
            margin: 0;
            text-transform: uppercase;
            text-shadow: 4px 4px 0px var(--yellow);
        }

        .cert-title-group p {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--pink);
            letter-spacing: 15px;
            margin-top: -5px;
            text-transform: uppercase;
        }

        .presented-to {
            margin-top: 20px;
            font-size: 1.2rem;
            color: var(--navy);
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 2;
        }

        .recipient-name {
            position: absolute;
            top: 345px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3.5rem;
            font-weight: 700;
            color: #4a1210;
            text-align: center;
            width: 80%;
            padding: 0;
            margin: 0;
            z-index: 10;
        }

        /* Name Input Styles */
        .name-input-container {
            position: fixed;
            top: 40px;
            left: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 31, 63, 0.85);
            backdrop-filter: blur(10px);
            border: 3px solid var(--navy);
            padding: 10px 20px;
            border-radius: 16px;
            box-shadow: 8px 8px 0px var(--navy);
            z-index: 1000;
        }

        .name-input-container label {
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .name-input-container input {
            border: 2px solid var(--navy);
            padding: 8px 16px;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: var(--navy);
            background: white;
            outline: none;
            width: 250px;
            font-size: 1rem;
        }

        .name-input-container input:focus {
            border-color: var(--pink);
        }

        .achievement-text {
            max-width: 850px;
            margin: 15px auto 40px auto;
            text-align: center;
            font-size: 1.3rem;
            line-height: 1.8;
            color: #444;
            font-weight: 400;
            z-index: 2;
        }

        .achievement-text strong {
            color: var(--pink);
            font-weight: 800;
        }

        .footer-signatures {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: auto;
            padding: 0 0 15px 0;
            box-sizing: border-box;
            z-index: 2;
        }

        .sig-box {
            text-align: center;
            width: 350px;
        }

        .sig-box .line {
            height: 4px;
            background: var(--navy);
            width: 280px;
            margin: 0 auto 15px auto;
            border-radius: 2px;
        }

        .sig-box strong {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--navy);
            display: block;
            letter-spacing: 1px;
            line-height: 1;
        }

        #capture-zone {
            padding: 0;
            display: inline-block;
            background: transparent;
        }
    </style>
</head>
<body>
    <button class="download-btn no-print" onclick="downloadCertificateAsPDF()">
        <span>Download PDF</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
    </button>

    <div class="name-input-container no-print">
        <label for="name-input">Enter Name:</label>
        <input type="text" id="name-input" placeholder="Type your name here..." oninput="updateNameFromInput(this.value)">
    </div>

    <div id="capture-zone">
        <div class="certificate-page" id="certificate">
            <div class="recipient-name"></div>
        </div>
</div>
    <script>
        // Auto-fill name from URL parameter or fall back to Supabase session profile on load
        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            let name = urlParams.get('name');
            
            const nameDisplay = document.querySelector('.recipient-name');
            if (nameDisplay) {
                if (name) {
                    nameDisplay.textContent = decodeURIComponent(name);
                } else {
                    // Try to fetch logged in user from Supabase
                    try {
                        const supabaseUrl = 'https://pxgurlmrtoxlmlpiyqrj.supabase.co';
                        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4Z3VybG1ydG94bG1scGl5cXJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTQzMjcsImV4cCI6MjA5MjU5MDMyN30.hoo0QEO1zswZdqzRAlCkiYk_r-BuxEN2kP6VKo2wbuo';
                        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                        
                        const { data: { session } } = await supabase.auth.getSession();
                        if (session && session.user) {
                            const { data: profile } = await supabase
                                .from('profiles')
                                .select('full_name')
                                .eq('id', session.user.id)
                                .single();
                            if (profile && profile.full_name) {
                                nameDisplay.textContent = profile.full_name;
                            } else {
                                nameDisplay.textContent = session.user.email || 'Participant';
                            }
                        } else {
                            nameDisplay.textContent = 'Participant';
                        }
                    } catch (err) {
                        console.error('Error loading session:', err);
                        nameDisplay.textContent = 'Participant';
                    }
                }
                
                // Pre-fill input field value
                const inputField = document.getElementById('name-input');
                if (inputField) {
                    inputField.value = nameDisplay.textContent !== 'Participant' ? nameDisplay.textContent : '';
                }
            }
        };

        function updateNameFromInput(val) {
            const nameDisplay = document.querySelector('.recipient-name');
            if (nameDisplay) {
                nameDisplay.textContent = val || 'Participant';
            }
        }

        async function downloadCertificateAsPDF() {
            const { jsPDF } = window.jspdf;
                const certElement = document.getElementById('certificate');
                const btn = document.querySelector('.download-btn');
                
                btn.innerHTML = '<span>Generating...</span>';
                btn.style.opacity = '0.7';
                btn.style.pointerEvents = 'none';

                try {
                    const scale = 3;
                    const canvas = await html2canvas(certElement, {
                        scale: scale,
                        useCORS: true,
                        backgroundColor: '#001f3f', // Navy blue to match branding and fix corners
                        logging: false,
                        letterRendering: true,
                        allowTaint: true
                    });
                    
                    const imgData = canvas.toDataURL('image/jpeg', 0.90);
                    
                    const imgWidth = canvas.width / scale;
                    const imgHeight = canvas.height / scale;
                    
                    const pdf = new jsPDF({
                        orientation: imgWidth > imgHeight ? 'l' : 'p',
                        unit: 'px',
                        format: [imgWidth, imgHeight]
                    });

                    pdf.addImage(imgData, 'JPEG', 0, 0, imgWidth, imgHeight);
                    pdf.save('Starlet5_Certificate_Rounded.pdf');
                
            } catch (error) {
                console.error('PDF Generation Error:', error);
                alert('Failed to generate PDF. Try using Chrome for best results!');
            } finally {
                btn.innerHTML = '<span>Download PDF</span> <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>';
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            }
        }
    </script>
</body>
</html>
